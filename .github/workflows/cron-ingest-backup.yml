name: Backup Cron Ingest

on:
  schedule:
    - cron: "5 8 * * *"
  workflow_dispatch:

concurrency:
  group: backup-cron-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger ingest backup
        env:
          APP_URL: https://signalscoutradar.com
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is missing"
            exit 1
          fi

          curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "x-cron-source: github_actions" \
            "$APP_URL/api/cron/ingest"
