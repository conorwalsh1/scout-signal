name: Backup Cron Process

on:
  schedule:
    - cron: "5 10 * * *"
  workflow_dispatch:

concurrency:
  group: backup-cron-process
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger process backup
        env:
          APP_URL: https://signalscoutradar.com
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is missing"
            exit 1
          fi

          curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/process"
